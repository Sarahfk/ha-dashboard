<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Floorplan</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    color: #eee;
  }

  h1 {
    font-size: 1.1rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 16px;
    color: #aac4ff;
    opacity: 0.8;
  }

  #ha-status {
    font-size: 0.75rem;
    margin-bottom: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    background: #ffffff10;
    color: #aaa;
  }
  #ha-status.connected { color: #7effa0; background: #7effa015; }
  #ha-status.error { color: #ff7e7e; background: #ff7e7e15; }

  .floorplan-wrapper {
    position: relative;
    display: inline-block;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 40px #00000060;
  }

  .floorplan-wrapper img {
    display: block;
    width: 100%;
    max-width: 900px;
    height: auto;
  }

  svg#overlays {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  svg#overlays polygon {
    pointer-events: all;
    cursor: pointer;
    transition: opacity 0.3s;
  }

  svg#overlays polygon:hover { opacity: 0.85 !important; }

  .room-label {
    pointer-events: none;
    font-size: 11px;
    font-weight: 600;
    fill: white;
    text-anchor: middle;
    dominant-baseline: middle;
    filter: drop-shadow(0 1px 2px #000);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    opacity: 0.9;
  }

  #controls-panel {
    margin-top: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    max-width: 920px;
  }

  .room-card {
    background: #ffffff08;
    border: 1px solid #ffffff15;
    border-radius: 12px;
    padding: 12px 16px;
    min-width: 140px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: border-color 0.2s, background 0.2s;
  }

  .room-card.active {
    border-color: var(--room-color, #aac4ff);
    background: #ffffff10;
  }

  .room-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .room-name {
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #ccc;
  }

  .toggle-btn {
    width: 36px;
    height: 20px;
    border-radius: 10px;
    border: none;
    background: #333;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .toggle-btn::after {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: white;
    top: 3px; left: 3px;
    transition: transform 0.2s;
  }

  .toggle-btn.on { background: var(--room-color, #aac4ff); }
  .toggle-btn.on::after { transform: translateX(16px); }

  .brightness-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .brightness-row span {
    font-size: 0.7rem;
    color: #888;
    width: 28px;
    text-align: right;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: #333;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--room-color, #aac4ff);
    cursor: pointer;
  }

  .entity-tag {
    font-size: 0.65rem;
    color: #555;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
</style>
</head>

  { id: 'hallway',     name: 'Hallway',     entity: 'light.hallway',     color: '#fbbf24', points: '184,21 304,21 304,206 476,206 476,309 184,309',                                         labelX: 210,  labelY: 260 },
  { id: 'bedroom',     name: 'Bedroom',     entity: 'light.bedroom',     color: '#f472b6', points: '22,309 270,309 270,671 22,671',                                                         labelX: 146,  labelY: 490 },
  { id: 'office',      name: 'Office',      entity: 'light.office',      color: '#34d399', points: '270,309 476,309 476,671 270,671',                                                       labelX: 373,  labelY: 490 },
  { id: 'living_room', name: 'Living Room', entity: 'light.living_room', color: '#facc15', points: '476,206 1045,206 1045,671 762,671 762,614 476,614',                                    labelX: 760,  labelY: 420 },
  { id: 'balcony',     name: 'Balcony',     entity: 'light.balcony',     color: '#4ade80', points: '476,614 762,614 762,840 476,840',                                                       labelX: 619,  labelY: 727 },
];

const state = {};
ROOMS.forEach(r => { state[r.id] = { on: false, brightness: 128 }; });

let ws, msgId = 1;
const pending = {};

function connect() {
  const wsUrl = HA_URL.replace(/^http/, 'ws') + '/api/websocket';
  ws = new WebSocket(wsUrl);
  ws.onmessage = (evt) => {
    const msg = JSON.parse(evt.data);
    if (msg.type === 'auth_required') {
      ws.send(JSON.stringify({ type: 'auth', access_token: HA_TOKEN }));
    } else if (msg.type === 'auth_ok') {
      setStatus('connected', 'Connected');
      send({ type: 'subscribe_events', event_type: 'state_changed' });
      send({ type: 'get_states' }, (m) => {
        m.result.forEach(s => {
          const room = ROOMS.find(r => r.entity === s.entity_id);
          if (room) applyState(room.id, s);
        });
      });
    } else if (msg.type === 'auth_invalid') {
      setStatus('error', 'Auth failed');
    } else if (msg.type === 'result' && pending[msg.id]) {
      pending[msg.id](msg);
      delete pending[msg.id];
    } else if (msg.type === 'event' && msg.event?.event_type === 'state_changed') {
      const { entity_id, new_state } = msg.event.data;
      const room = ROOMS.find(r => r.entity === entity_id);
      if (room) applyState(room.id, new_state);
    }
  };
  ws.onerror = () => setStatus('error', 'Connection error');
  ws.onclose = () => { setStatus('', 'Disconnected — retrying…'); setTimeout(connect, 5000); };
}

function send(payload, cb) {
  const id = msgId++;
  payload.id = id;
  if (cb) pending[id] = cb;
  ws.send(JSON.stringify(payload));
}

function callService(entity, on, brightness) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  send({
    type: 'call_service',
    domain: 'light',
    service: on ? 'turn_on' : 'turn_off',
    service_data: on ? { entity_id: entity, brightness } : { entity_id: entity },
  });
}

function setStatus(cls, text) {
  const el = document.getElementById('ha-status');
  el.className = cls;
  el.textContent = text;
}

function applyState(roomId, haState) {
  if (!haState) return;
  state[roomId] = {
    on: haState.state === 'on',
    brightness: haState.attributes?.brightness ?? 128,
  };
  updateRoomUI(roomId);
}

function updateRoomUI(roomId) {
  const room = ROOMS.find(r => r.id === roomId);
  const s = state[roomId];
  const alpha = s.on ? (0.2 + (s.brightness / 255) * 0.45) : 0;

  const overlay = document.getElementById('overlay-' + roomId);
  if (overlay) overlay.setAttribute('fill-opacity', alpha);

  const card = document.getElementById('card-' + roomId);
  if (card) card.classList.toggle('active', s.on);

  const toggleBtn = document.getElementById('toggle-' + roomId);
  if (toggleBtn) toggleBtn.classList.toggle('on', s.on);

  const slider = document.getElementById('slider-' + roomId);
  if (slider) slider.value = s.brightness;

  const label = document.getElementById('brightness-label-' + roomId);
  if (label) label.textContent = Math.round((s.brightness / 255) * 100) + '%';
}

function toggleRoom(roomId) {
  const room = ROOMS.find(r => r.id === roomId);
  state[roomId].on = !state[roomId].on;
  updateRoomUI(roomId);
  callService(room.entity, state[roomId].on, state[roomId].brightness);
}

function setBrightness(roomId, value) {
  const room = ROOMS.find(r => r.id === roomId);
  state[roomId].brightness = parseInt(value);
  state[roomId].on = true;
  updateRoomUI(roomId);
  callService(room.entity, true, state[roomId].brightness);
}

function buildSVG() {
  const svg = document.getElementById('overlays');
  ROOMS.forEach(room => {
    const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    poly.setAttribute('id', 'overlay-' + room.id);
    poly.setAttribute('points', room.points);
    poly.setAttribute('fill', room.color);
    poly.setAttribute('fill-opacity', '0');
    poly.setAttribute('stroke', 'none');
    poly.addEventListener('click', () => toggleRoom(room.id));
    svg.appendChild(poly);

    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', room.labelX);
    text.setAttribute('y', room.labelY);
    text.setAttribute('class', 'room-label');
    text.textContent = room.name;
    svg.appendChild(text);
  });
}

function buildControls() {
  const panel = document.getElementById('controls-panel');
  ROOMS.forEach(room => {
    const card = document.createElement('div');
    card.className = 'room-card';
    card.id = 'card-' + room.id;
    card.style.setProperty('--room-color', room.color);
    card.innerHTML = `
      <div class="room-card-header">
        <span class="room-name">${room.name}</span>
        <button class="toggle-btn" id="toggle-${room.id}" onclick="toggleRoom('${room.id}')"></button>
      </div>
      <div class="brightness-row">
        <input type="range" id="slider-${room.id}" min="1" max="255" value="128"
          oninput="setBrightness('${room.id}', this.value)" />
        <span id="brightness-label-${room.id}">50%</span>
      </div>
      <div class="entity-tag">${room.entity}</div>
    `;
    panel.appendChild(card);
  });
}

buildSVG();
buildControls();
ROOMS.forEach(r => updateRoomUI(r.id));
connect();
</script>
